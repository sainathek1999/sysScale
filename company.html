<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SysScale — Company Intel</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">

  <style>
    body {
      min-height: 100vh; height: auto;
      overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column;
      background: var(--bg0);
    }

    /* ── Header ───────────────────────────────────────────── */
    .header {
      height: var(--header-h);
      background: rgba(255,255,255,0.92);
      border-bottom: 1px solid var(--border2);
      box-shadow: 0 1px 0 var(--border), 0 2px 8px rgba(15,23,42,0.04);
      display: flex; align-items: center; padding: 0 20px; gap: 14px;
      flex-shrink: 0; position: sticky; top: 0; z-index: 50;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    }
    .logo {
      display: flex; align-items: center; gap: 9px;
      font-family: var(--font-head); font-size: 15px;
      font-weight: 700; color: var(--text); text-decoration: none;
    }
    .logo-mark {
      width: 30px; height: 30px; border-radius: 8px;
      background: var(--indigo);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; color: white;
      box-shadow: var(--shadow-sm);
    }
    .header-sep { width: 1px; height: 18px; background: var(--border2); }
    .header-nav { display: flex; gap: 2px; }
    .header-tab {
      padding: 5px 13px; border-radius: 20px; font-size: 13px;
      font-weight: 500; color: var(--text3); border: 1px solid transparent;
      background: none; text-decoration: none; font-family: var(--font-body);
      transition: color var(--dur-fast), background var(--dur-fast);
      display: inline-flex; align-items: center;
    }
    .header-tab:hover  { color: var(--text2); background: var(--bg2); }
    .header-tab.active { color: var(--indigo); background: var(--indigo3); border-color: rgba(var(--indigo-rgb),0.20); font-weight: 600; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .version-badge {
      font-size: 10px; font-family: var(--font-mono);
      padding: 2px 8px; border-radius: 20px;
      background: var(--bg2); color: var(--text3); border: 1px solid var(--border2);
    }

    /* ── Page layout ──────────────────────────────────────── */
    .page-wrap   { flex: 1; overflow: visible; }
    .page-container { max-width: 1060px; margin: 0 auto; padding: 0 24px 80px; }

    /* ── Hero ─────────────────────────────────────────────── */
    .company-hero {
      padding: 48px 0 40px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
      display: flex;
      align-items: flex-start;
      gap: 28px;
      flex-wrap: wrap;
    }
    .company-badge-lg {
      width: 80px; height: 80px; border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 900; color: white;
      font-family: var(--font-head); flex-shrink: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .company-hero-text { flex: 1; min-width: 220px; }
    .company-breadcrumb {
      font-size: 11.5px; color: var(--text3); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .company-breadcrumb a { color: var(--text3); text-decoration: none; }
    .company-breadcrumb a:hover { color: var(--indigo); }
    .company-breadcrumb-sep { color: var(--border3); font-size: 10px; }
    .company-hero-name {
      font-family: var(--font-head); font-size: 38px; font-weight: 800;
      letter-spacing: -1.5px; line-height: 1; margin-bottom: 8px;
    }
    .company-hero-tagline {
      font-size: 16px; color: var(--text2); line-height: 1.6; margin-bottom: 16px;
      font-style: italic; max-width: 480px;
    }
    .company-hero-stats { display: flex; gap: 16px; flex-wrap: wrap; }
    .hero-stat {
      display: flex; flex-direction: column; gap: 2px;
    }
    .hero-stat-label { font-size: 9.5px; font-family: var(--font-mono); font-weight: 700; color: var(--text4); letter-spacing: .10em; text-transform: uppercase; }
    .hero-stat-val   { font-size: 14px; font-weight: 700; font-family: var(--font-head); color: var(--text); }

    /* Difficulty stars */
    .difficulty-stars { display: flex; gap: 3px; }
    .star { width: 12px; height: 12px; border-radius: 2px; background: var(--bg3); }
    .star.filled { background: var(--amber); }

    /* ── Main grid ────────────────────────────────────────── */
    .company-grid {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 28px;
      align-items: start;
    }
    @media (max-width: 820px) { .company-grid { grid-template-columns: 1fr; } }

    /* ── Section ──────────────────────────────────────────── */
    .section { margin-bottom: 36px; }
    .section-title {
      font-family: var(--font-head); font-size: 18px; font-weight: 700;
      color: var(--text); letter-spacing: -0.3px; margin-bottom: 4px;
    }
    .section-sub { font-size: 12.5px; color: var(--text3); margin-bottom: 18px; }

    .section-label {
      font-size: 9px; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--text3);
      font-family: var(--font-mono); margin-bottom: 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* Overview */
    .overview-text {
      font-size: 14.5px; color: var(--text2); line-height: 1.8;
      background: white; border: 1px solid var(--border);
      border-left: 3px solid var(--company-color, var(--indigo));
      border-radius: var(--r-lg); padding: 20px 24px;
      box-shadow: var(--shadow-sm);
    }

    /* Interview rounds timeline */
    .rounds-list { display: flex; flex-direction: column; gap: 0; }
    .round-item {
      display: flex; gap: 16px; position: relative;
    }
    .round-item::before {
      content: '';
      position: absolute;
      left: 19px; top: 42px;
      width: 2px;
      height: calc(100% - 10px);
      background: var(--border2);
    }
    .round-item:last-child::before { display: none; }

    .round-dot {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; margin-top: 2px;
      border: 2px solid var(--border2); background: white;
      box-shadow: var(--shadow-sm);
    }
    .round-dot.coding    { background: rgba(43,160,126,0.08); border-color: rgba(43,160,126,0.25); }
    .round-dot.design    { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.25); }
    .round-dot.behavioral{ background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.25); }
    .round-dot.hr        { background: rgba(139,92,246,0.08); border-color: rgba(139,92,246,0.25); }

    .round-body { flex: 1; padding-bottom: 22px; }
    .round-header { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
    .round-name { font-size: 14px; font-weight: 700; font-family: var(--font-head); color: var(--text); }
    .round-duration {
      font-size: 10px; font-family: var(--font-mono); font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
      background: var(--bg2); color: var(--text3); border: 1px solid var(--border2);
    }
    .round-type-badge {
      font-size: 8.5px; font-family: var(--font-mono); font-weight: 700;
      padding: 2px 7px; border-radius: 3px; text-transform: uppercase; letter-spacing: .06em;
    }
    .round-type-coding    { background: var(--indigo3); color: var(--indigo); border: 1px solid rgba(var(--indigo-rgb),0.18); }
    .round-type-design    { background: rgba(16,185,129,0.08); color: var(--teal);   border: 1px solid rgba(16,185,129,0.18); }
    .round-type-behavioral{ background: rgba(245,158,11,0.08); color: var(--amber);  border: 1px solid rgba(245,158,11,0.18); }
    .round-type-hr        { background: rgba(139,92,246,0.08); color: var(--purple); border: 1px solid rgba(139,92,246,0.18); }
    .round-desc { font-size: 13px; color: var(--text3); line-height: 1.6; }

    /* Rubric */
    .rubric-list { display: flex; flex-direction: column; gap: 10px; }
    .rubric-row {
      background: white; border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 16px 18px;
      box-shadow: var(--shadow-sm);
      display: flex; align-items: flex-start; gap: 14px;
    }
    .rubric-weight {
      font-size: 9px; font-family: var(--font-mono); font-weight: 700;
      padding: 3px 8px; border-radius: 3px; text-transform: uppercase;
      letter-spacing: .06em; flex-shrink: 0; white-space: nowrap; margin-top: 2px;
    }
    .rubric-weight-Critical { background: rgba(239,68,68,0.08); color: var(--red);  border: 1px solid rgba(239,68,68,0.18); }
    .rubric-weight-High     { background: rgba(245,158,11,0.08); color: var(--amber);border: 1px solid rgba(245,158,11,0.18); }
    .rubric-weight-Medium   { background: var(--bg2);            color: var(--text3);border: 1px solid var(--border2); }
    .rubric-body { flex: 1; }
    .rubric-dim  { font-size: 13px; font-weight: 700; color: var(--text); font-family: var(--font-head); margin-bottom: 4px; }
    .rubric-desc { font-size: 12.5px; color: var(--text3); line-height: 1.65; }

    /* Top systems */
    .systems-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (max-width: 560px) { .systems-grid { grid-template-columns: 1fr; } }
    .system-card {
      background: white; border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 14px 16px;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--dur), box-shadow var(--dur), transform var(--dur) var(--ease-out);
    }
    .system-card:hover {
      border-color: rgba(var(--indigo-rgb),0.20);
      box-shadow: var(--shadow); transform: translateY(-2px);
    }
    .system-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .system-card-name { font-size: 13px; font-weight: 700; color: var(--text); font-family: var(--font-head); }
    .system-freq {
      font-size: 8.5px; font-family: var(--font-mono); font-weight: 700;
      padding: 2px 7px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .05em;
    }
    .freq-Very-High { background: rgba(239,68,68,0.08); color: var(--red);   border: 1px solid rgba(239,68,68,0.18); }
    .freq-High      { background: rgba(245,158,11,0.08); color: var(--amber); border: 1px solid rgba(245,158,11,0.18); }
    .freq-Medium    { background: var(--bg2);            color: var(--text3); border: 1px solid var(--border2); }
    .freq-Low       { background: var(--bg2);            color: var(--text4); border: 1px solid var(--border); }
    .system-card-note { font-size: 11.5px; color: var(--text3); line-height: 1.55; margin-bottom: 10px; }
    .system-card-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-family: var(--font-mono); font-weight: 700;
      color: var(--indigo); text-decoration: none;
      padding: 4px 10px; background: var(--indigo3);
      border: 1px solid rgba(var(--indigo-rgb),0.18); border-radius: 20px;
      transition: background var(--dur-fast);
    }
    .system-card-link:hover { background: rgba(var(--indigo-rgb),0.14); }

    /* Tips */
    .tips-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .tip-item {
      display: flex; gap: 12px; align-items: flex-start;
      background: white; border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 14px 16px;
      box-shadow: var(--shadow-sm);
      transition: border-color var(--dur), box-shadow var(--dur);
    }
    .tip-item:hover { border-color: var(--border2); box-shadow: var(--shadow); }
    .tip-num {
      width: 24px; height: 24px; border-radius: 6px;
      background: var(--indigo3); border: 1px solid rgba(var(--indigo-rgb),0.20);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800; font-family: var(--font-mono);
      color: var(--indigo); flex-shrink: 0;
    }
    .tip-text { font-size: 13.5px; color: var(--text2); line-height: 1.7; }
    .tip-text strong { color: var(--text); font-weight: 700; }

    /* Quotes */
    .quote-block {
      background: linear-gradient(135deg, rgba(43,160,126,0.06) 0%, rgba(43,160,126,0.03) 100%);
      border: 1px solid rgba(43,160,126,0.14); border-radius: var(--r-xl);
      padding: 20px 24px; position: relative; overflow: hidden;
      margin-bottom: 10px;
    }
    .quote-block::before {
      content: '"'; font-size: 80px; font-family: Georgia, serif;
      color: rgba(43,160,126,0.12); position: absolute;
      top: -12px; left: 12px; line-height: 1; pointer-events: none;
    }
    .quote-text {
      font-size: 14px; color: var(--text2); line-height: 1.75;
      font-style: italic; position: relative; z-index: 1;
      padding-left: 12px;
    }
    .quote-source {
      font-size: 10px; font-family: var(--font-mono); font-weight: 700;
      color: var(--text4); margin-top: 10px; letter-spacing: .06em;
      text-transform: uppercase; padding-left: 12px;
    }

    /* Unique trait banner */
    .unique-trait {
      background: rgba(245,158,11,0.05);
      border: 1px solid rgba(245,158,11,0.20);
      border-left: 3px solid var(--amber);
      border-radius: var(--r-lg); padding: 14px 18px;
      font-size: 13.5px; color: var(--text2); line-height: 1.7;
      margin-top: 20px;
    }
    .unique-trait-label {
      font-size: 9px; font-family: var(--font-mono); font-weight: 700;
      text-transform: uppercase; letter-spacing: .14em; color: var(--amber);
      margin-bottom: 6px;
    }

    /* ── Sidebar ──────────────────────────────────────────── */
    .company-sidebar { display: flex; flex-direction: column; gap: 14px; }

    .sidebar-card {
      background: white; border: 1px solid var(--border);
      border-radius: var(--r-xl); padding: 18px 20px;
      box-shadow: var(--shadow-sm);
    }
    .sidebar-card-title {
      font-size: 9px; font-family: var(--font-mono); font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase; color: var(--text4);
      margin-bottom: 14px;
    }

    /* Prep checklist */
    .checklist { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .checklist-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 12px; color: var(--text2); line-height: 1.6;
      cursor: pointer; padding: 2px 0;
    }
    .checklist-box {
      width: 16px; height: 16px; border-radius: 4px;
      border: 1.5px solid var(--border2); flex-shrink: 0; margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: transparent;
      transition: all var(--dur) var(--ease-spring);
    }
    .checklist-item.checked .checklist-box {
      background: var(--teal); border-color: var(--teal); color: white;
    }
    .checklist-item.checked .checklist-text { color: var(--text3); text-decoration: line-through; }

    .checklist-progress { margin-bottom: 14px; }
    .checklist-progress-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; margin-bottom: 5px; }
    .checklist-progress-fill { height: 100%; background: var(--teal); border-radius: 2px; transition: width 0.4s var(--ease-out); }
    .checklist-progress-label { font-size: 10px; font-family: var(--font-mono); font-weight: 700; color: var(--text3); }

    /* Company switcher */
    .company-switcher { display: flex; flex-direction: column; gap: 4px; }
    .company-switch-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: var(--r);
      text-decoration: none; font-size: 12.5px; font-weight: 600;
      color: var(--text2); font-family: var(--font-head);
      transition: background var(--dur-fast), color var(--dur-fast);
    }
    .company-switch-item:hover { background: var(--bg2); color: var(--text); }
    .company-switch-item.active { background: var(--indigo3); color: var(--indigo); }
    .company-switch-dot {
      width: 26px; height: 26px; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 900; color: white;
      font-family: var(--font-head); flex-shrink: 0;
    }

    /* Readiness widget */
    .readiness-widget {
      background: linear-gradient(135deg, rgba(43,160,126,0.06), rgba(43,160,126,0.03));
      border: 1px solid rgba(43,160,126,0.14);
      border-radius: var(--r-xl); padding: 18px 20px;
    }
    .readiness-widget-title {
      font-size: 9px; font-family: var(--font-mono); font-weight: 700;
      letter-spacing: .14em; text-transform: uppercase; color: var(--indigo);
      margin-bottom: 12px;
    }
    .readiness-ring-sm { position: relative; width: 56px; height: 56px; margin-bottom: 10px; }
    .readiness-ring-sm svg { transform: rotate(-90deg); }
    .readiness-ring-sm-label {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      font-family: var(--font-mono); font-size: 13px; font-weight: 800; color: var(--indigo);
    }
    .readiness-next {
      font-size: 12px; color: var(--text2); line-height: 1.6;
    }
    .readiness-next strong { color: var(--text); font-weight: 700; }
  </style>
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo"><span class="logo-mark">SS</span>SysScale</a>
    <span class="header-sep"></span>
    <nav class="header-nav">
      <a href="index.html"      class="header-tab">Home</a>
      <a href="estimator.html"  class="header-tab">Estimator</a>
      <a href="learn.html"      class="header-tab">Learn</a>
      <a href="practice.html"   class="header-tab active">Practice</a>
      <a href="reference.html"  class="header-tab">Reference</a>
    </nav>
    <div class="header-right">
      <span class="version-badge">v4.0</span>
    </div>
  </header>

  <div class="page-wrap">
    <div class="page-container" id="page-container">
      <!-- Filled by JS -->
      <div style="padding:80px 0;text-align:center;color:var(--text3);font-family:var(--font-mono);font-size:13px;">
        Loading company intel…
      </div>
    </div>
  </div>

  <script src="js/core/onboarding.js"></script>
  <script src="js/content/companies.js"></script>
  <script src="js/content/tracks.js"></script>
  <script src="js/core/progress.js"></script>
  <script src="js/core/mentor.js"></script>
  <script>
  (function () {
    const params   = new URLSearchParams(location.search);
    const cId      = params.get('c') || 'google';
    const intel    = window.SS.COMPANIES_INTEL || [];
    const company  = intel.find(c => c.id === cId);
    const ob       = window.SS.onboarding;
    const user     = ob ? ob.getUser() : null;
    const STORAGE_KEY = 'ss_checklist_v1';

    if (!company) {
      document.getElementById('page-container').innerHTML =
        '<div style="padding:80px 0;text-align:center;">' +
        '<div style="font-size:48px;margin-bottom:16px;">🏢</div>' +
        '<div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px;">Company Not Found</div>' +
        '<a href="companies.html" style="display:inline-block;margin-top:16px;padding:10px 22px;background:var(--indigo);color:white;border-radius:var(--r);text-decoration:none;font-weight:700;font-family:var(--font-head);">← All Companies</a>' +
        '</div>';
      return;
    }

    document.title = 'SysScale — ' + company.name + ' Interview Guide';

    /* ── Checklist persistence ── */
    function loadChecklist() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(_) { return {}; }
    }
    function saveChecklist(data) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(_) {}
    }

    const ROUND_ICONS = { coding: '💻', design: '🏗️', behavioral: '🗣️', hr: '👋' };

    /* ── Build page ── */
    const container = document.getElementById('page-container');
    container.innerHTML = '';

    /* Hero */
    const stars = Array.from({length: 5}, (_, i) =>
      '<div class="star' + (i < company.difficulty ? ' filled' : '') + '"></div>'
    ).join('');

    const isTargetCompany = user && user.targetCompany === company.id;

    const hero = document.createElement('div');
    hero.className = 'company-hero';
    hero.innerHTML =
      '<div class="company-badge-lg" style="background:' + company.color + ';">' + company.letter + '</div>' +
      '<div class="company-hero-text">' +
        '<div class="company-breadcrumb">' +
          '<a href="companies.html">Companies</a>' +
          '<span class="company-breadcrumb-sep">›</span>' +
          '<span>' + company.name + '</span>' +
        '</div>' +
        '<div class="company-hero-name" style="color:' + company.color + ';">' + company.name + '</div>' +
        '<div class="company-hero-tagline">' + company.tagline + '</div>' +
        '<div class="company-hero-stats">' +
          '<div class="hero-stat"><div class="hero-stat-label">Interview Difficulty</div><div class="hero-stat-val"><div class="difficulty-stars">' + stars + '</div></div></div>' +
          '<div class="hero-stat"><div class="hero-stat-label">Rounds</div><div class="hero-stat-val">' + company.rounds.length + ' rounds</div></div>' +
          '<div class="hero-stat"><div class="hero-stat-label">Top Systems</div><div class="hero-stat-val">' + company.topSystems.length + ' identified</div></div>' +
          (isTargetCompany ? '<div class="hero-stat"><div class="hero-stat-label">Status</div><div class="hero-stat-val" style="color:var(--teal);">★ Your Target</div></div>' : '') +
        '</div>' +
      '</div>';
    container.appendChild(hero);

    /* Main grid */
    const grid = document.createElement('div');
    grid.className = 'company-grid';

    const main = document.createElement('div');
    const sidebar = document.createElement('aside');
    sidebar.className = 'company-sidebar';

    /* ── Overview ── */
    main.innerHTML += '<div class="section-label">Overview</div>';
    const overview = document.createElement('div');
    overview.className = 'overview-text';
    overview.style.setProperty('--company-color', company.color);
    overview.textContent = company.overview;
    main.appendChild(overview);

    /* ── Interview Rounds ── */
    const roundsSection = document.createElement('div');
    roundsSection.className = 'section';
    roundsSection.style.marginTop = '32px';
    roundsSection.innerHTML = '<div class="section-label">Interview Rounds</div>';
    const roundsList = document.createElement('div');
    roundsList.className = 'rounds-list';
    company.rounds.forEach(r => {
      const item = document.createElement('div');
      item.className = 'round-item';
      item.innerHTML =
        '<div class="round-dot ' + r.type + '">' + (ROUND_ICONS[r.type] || '🎯') + '</div>' +
        '<div class="round-body">' +
          '<div class="round-header">' +
            '<div class="round-name">' + r.name + '</div>' +
            '<div class="round-duration">' + r.duration + '</div>' +
            '<div class="round-type-badge round-type-' + r.type + '">' + r.type + '</div>' +
          '</div>' +
          '<div class="round-desc">' + r.desc + '</div>' +
        '</div>';
      roundsList.appendChild(item);
    });
    roundsSection.appendChild(roundsList);
    main.appendChild(roundsSection);

    /* ── Evaluation Rubric ── */
    const rubricSection = document.createElement('div');
    rubricSection.className = 'section';
    rubricSection.innerHTML = '<div class="section-label">How They Evaluate You</div>';
    const rubricList = document.createElement('div');
    rubricList.className = 'rubric-list';
    company.rubric.forEach(r => {
      const row = document.createElement('div');
      row.className = 'rubric-row';
      row.innerHTML =
        '<div class="rubric-weight rubric-weight-' + r.weight.replace(' ','') + '">' + r.weight + '</div>' +
        '<div class="rubric-body">' +
          '<div class="rubric-dim">' + r.dimension + '</div>' +
          '<div class="rubric-desc">' + r.desc + '</div>' +
        '</div>';
      rubricList.appendChild(row);
    });
    rubricSection.appendChild(rubricList);
    main.appendChild(rubricSection);

    /* ── Top Systems ── */
    const sysSection = document.createElement('div');
    sysSection.className = 'section';
    sysSection.innerHTML = '<div class="section-label">Top Systems Asked</div>';
    const sysGrid = document.createElement('div');
    sysGrid.className = 'systems-grid';
    company.topSystems.forEach(s => {
      const freqClass = 'freq-' + s.frequency.replace(' ','-');
      const card = document.createElement('div');
      card.className = 'system-card';
      card.innerHTML =
        '<div class="system-card-header">' +
          '<div class="system-card-name">' + s.name + '</div>' +
          '<div class="system-freq ' + freqClass + '">' + s.frequency + '</div>' +
        '</div>' +
        '<div class="system-card-note">' + s.note + '</div>' +
        (s.estimatorId
          ? '<a class="system-card-link" href="estimator.html?s=' + s.estimatorId + '">⚡ Practice in Estimator</a>'
          : '<span style="font-size:11px;color:var(--text4);font-family:var(--font-mono);">Coming in Sprint 5+</span>'
        );
      sysGrid.appendChild(card);
    });
    sysSection.appendChild(sysGrid);
    main.appendChild(sysSection);

    /* ── Insider Tips ── */
    const tipsSection = document.createElement('div');
    tipsSection.className = 'section';
    tipsSection.innerHTML = '<div class="section-label">Insider Tips</div>';
    const tipsList = document.createElement('ul');
    tipsList.className = 'tips-list';
    company.tips.forEach((tip, i) => {
      const li = document.createElement('li');
      li.className = 'tip-item';
      li.innerHTML =
        '<div class="tip-num">' + (i + 1) + '</div>' +
        '<div class="tip-text">' + tip + '</div>';
      tipsList.appendChild(li);
    });
    tipsSection.appendChild(tipsList);
    main.appendChild(tipsSection);

    /* ── Quotes ── */
    if (company.quotes && company.quotes.length) {
      const quotesSection = document.createElement('div');
      quotesSection.className = 'section';
      quotesSection.innerHTML = '<div class="section-label">What Interviewers Say</div>';
      company.quotes.forEach(q => {
        const block = document.createElement('div');
        block.className = 'quote-block';
        block.innerHTML =
          '<div class="quote-text">' + q + '</div>' +
          '<div class="quote-source">— ' + company.name + ' Engineer / Glassdoor</div>';
        quotesSection.appendChild(block);
      });
      main.appendChild(quotesSection);
    }

    /* ── Unique trait ── */
    if (company.uniqueTrait) {
      const trait = document.createElement('div');
      trait.className = 'unique-trait';
      trait.innerHTML =
        '<div class="unique-trait-label">⚡ What makes ' + company.name + ' different</div>' +
        company.uniqueTrait;
      main.appendChild(trait);
    }

    /* ── SIDEBAR ── */

    /* Readiness widget */
    if (user) {
      const prog = window.SS && window.SS.progress;
      const MENTOR = window.SS && window.SS.mentor;
      const readiness = MENTOR ? MENTOR.calcReadiness(user) : 0;
      const circ = 131.94;
      const offset = circ - (circ * readiness / 100);

      const rwid = document.createElement('div');
      rwid.className = 'readiness-widget';
      rwid.innerHTML =
        '<div class="readiness-widget-title">Your Readiness</div>' +
        '<div class="readiness-ring-sm">' +
          '<svg width="56" height="56" viewBox="0 0 56 56">' +
            '<circle cx="28" cy="28" r="21" fill="none" stroke="#E2E8F0" stroke-width="5"/>' +
            '<circle cx="28" cy="28" r="21" fill="none" stroke="#2BA07E" stroke-width="5"' +
              ' stroke-dasharray="' + circ + '" stroke-dashoffset="' + offset + '"' +
              ' stroke-linecap="round" style="transition:stroke-dashoffset 1s ease;"/>' +
          '</svg>' +
          '<div class="readiness-ring-sm-label">' + readiness + '%</div>' +
        '</div>' +
        '<div class="readiness-next">Keep completing modules and estimator practice to boost your score.</div>';
      sidebar.appendChild(rwid);
    }

    /* Prep checklist */
    const checkData = loadChecklist();
    const checkKey  = 'company_' + company.id;
    if (!checkData[checkKey]) checkData[checkKey] = {};

    const checkCard = document.createElement('div');
    checkCard.className = 'sidebar-card';

    function renderChecklist() {
      const done  = company.prepChecklist.filter((_, i) => checkData[checkKey][i]).length;
      const total = company.prepChecklist.length;
      const pct   = Math.round((done / total) * 100);

      checkCard.innerHTML =
        '<div class="sidebar-card-title">Prep Checklist</div>' +
        '<div class="checklist-progress">' +
          '<div class="checklist-progress-bar"><div class="checklist-progress-fill" style="width:' + pct + '%;"></div></div>' +
          '<div class="checklist-progress-label">' + done + ' / ' + total + ' done</div>' +
        '</div>' +
        '<ul class="checklist">' +
          company.prepChecklist.map((item, i) => {
            const checked = !!checkData[checkKey][i];
            return '<li class="checklist-item' + (checked ? ' checked' : '') + '" onclick="toggleCheck(' + i + ',this)">' +
              '<div class="checklist-box">' + (checked ? '✓' : '') + '</div>' +
              '<span class="checklist-text">' + item + '</span>' +
            '</li>';
          }).join('') +
        '</ul>';
    }

    window.toggleCheck = function (i, el) {
      checkData[checkKey][i] = !checkData[checkKey][i];
      saveChecklist(checkData);
      renderChecklist();
    };

    renderChecklist();
    sidebar.appendChild(checkCard);

    /* Company switcher */
    const switchCard = document.createElement('div');
    switchCard.className = 'sidebar-card';
    switchCard.innerHTML = '<div class="sidebar-card-title">All Companies</div>';
    const switchList = document.createElement('div');
    switchList.className = 'company-switcher';
    intel.forEach(c => {
      const item = document.createElement('a');
      item.href      = 'company.html?c=' + c.id;
      item.className = 'company-switch-item' + (c.id === cId ? ' active' : '');
      item.innerHTML =
        '<div class="company-switch-dot" style="background:' + c.color + ';">' + c.letter + '</div>' +
        c.name;
      switchList.appendChild(item);
    });
    switchCard.appendChild(switchList);
    sidebar.appendChild(switchCard);

    grid.appendChild(main);
    grid.appendChild(sidebar);
    container.appendChild(grid);

  })();
  </script>
</body>
</html>
