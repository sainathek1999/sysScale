<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SysScale — Learn</title>
  <meta name="description" content="System design curriculum — 5 tracks, 18 modules, from HTTP basics to distributed transactions.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body>

  <header class="header">
    <a href="index.html" class="logo"><span class="logo-mark">SS</span>SysScale</a>
    <span class="header-sep"></span>
    <nav class="header-nav">
      <a href="index.html"     class="header-tab">Home</a>
      <a href="estimator.html" class="header-tab">Estimator</a>
      <a href="learn.html"     class="header-tab active">Learn</a>
      <a href="practice.html"  class="header-tab">Practice</a>
      <a href="reference.html" class="header-tab">Reference</a>
    </nav>
    <div class="header-right">
      <span class="version-badge">v4.0</span>
    </div>
  </header>

  <div class="page-wrap">
    <div class="page-container">

      <div class="page-title">Learn System Design</div>
      <div class="page-subtitle" id="learn-sub">5 tracks · loading modules…</div>

      <div id="tracks-content"></div>

    </div>
  </div>

  <script src="js/content/tracks.js"></script>
  <script src="js/core/progress.js"></script>
  <script src="js/content/modules-foundations.js"></script>
  <script>
    (function () {
      var tracks    = (window.SS && window.SS.TRACKS) ? window.SS.TRACKS : [];
      var progress  = window.SS && window.SS.progress;
      var MODULES   = (window.SS && window.SS.MODULES) ? window.SS.MODULES : {};
      var container = document.getElementById('tracks-content');

      var totalModules = tracks.reduce(function (s, t) { return s + t.modules.length; }, 0);
      var totalMins    = tracks.reduce(function (s, t) {
        return s + t.modules.reduce(function (ms, m) { return ms + (m.readingMins || 0); }, 0);
      }, 0);
      document.getElementById('learn-sub').textContent =
        tracks.length + ' tracks · ' + totalModules + ' modules · ~' + Math.round(totalMins / 60) + ' hours';

      var hashTarget = location.hash.replace('#', '');

      tracks.forEach(function (track) {
        var prog    = progress ? progress.getTrackProgress(track.id) : { done: 0, total: track.modules.length };
        var section = document.createElement('div');
        section.className = 'track-section';
        section.id = track.id;

        var isSystemsTrack    = track.id === 'systems';
        var hasContent        = !!(MODULES[track.id] && MODULES[track.id].length);
        var trackColor        = track.color;

        var headerHTML =
          '<div class="track-section-header" style="border-color: ' + hexToAlpha(trackColor, 0.20) + '">' +
            '<div class="track-section-icon">' + track.icon + '</div>' +
            '<div class="track-section-name" style="color:' + trackColor + '">' + track.name + '</div>' +
            '<div class="track-section-meta">' + prog.done + ' / ' + prog.total + ' complete</div>' +
          '</div>' +
          '<div class="track-section-desc">' + track.description + '</div>';

        var modulesHTML = '<div class="module-list">';
        track.modules.forEach(function (mod) {
          var done       = progress && progress.isCompleted(mod.id);
          var modHasContent = hasContent &&
            MODULES[track.id].some(function (m) { return m.id === mod.id; });

          if (isSystemsTrack) {
            modulesHTML +=
              '<a href="estimator.html?s=' + mod.estimatorId + '" class="module-item' + (done ? ' completed' : '') + '">' +
                '<span class="module-check">' + (done ? '✓' : '') + '</span>' +
                '<span class="module-title">' + mod.title + '</span>' +
                '<span class="difficulty-badge ' + mod.difficulty + '">' + mod.difficulty + '</span>' +
                '<span class="module-arrow">→</span>' +
              '</a>';
          } else if (modHasContent) {
            modulesHTML +=
              '<a href="module.html?t=' + track.id + '&m=' + mod.id + '" class="module-item' + (done ? ' completed' : '') + '">' +
                '<span class="module-check">' + (done ? '✓' : '') + '</span>' +
                '<span class="module-title">' + mod.title + '</span>' +
                '<span class="module-time">' + mod.readingMins + ' min</span>' +
                '<span class="difficulty-badge ' + mod.difficulty + '">' + mod.difficulty + '</span>' +
                '<span class="module-arrow">→</span>' +
              '</a>';
          } else {
            modulesHTML +=
              '<span class="module-item">' +
                '<span class="module-check"></span>' +
                '<span class="module-title">' + mod.title + '</span>' +
                '<span class="module-time">' + mod.readingMins + ' min</span>' +
                '<span class="difficulty-badge ' + mod.difficulty + '">' + mod.difficulty + '</span>' +
                '<span class="module-soon">Sprint 3</span>' +
              '</span>';
          }
        });
        modulesHTML += '</div>';

        section.innerHTML = headerHTML + modulesHTML;
        container.appendChild(section);
      });

      if (hashTarget) {
        var el = document.getElementById(hashTarget);
        if (el) setTimeout(function () { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 80);
      }

      function hexToAlpha(hex, alpha) {
        var r = parseInt(hex.slice(1, 3), 16);
        var g = parseInt(hex.slice(3, 5), 16);
        var b = parseInt(hex.slice(5, 7), 16);
        return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
      }
    })();
  </script>

</body>
</html>
